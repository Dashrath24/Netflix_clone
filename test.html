<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Slider</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .slider-container {
      position: relative;
      width: 80%;
      max-width: 900px;
      overflow: hidden;
    }

    .slider {
      display: flex;
      transition: transform 0.5s ease-in-out;
    }

    .slide {
      position: relative;
      min-width: 25%;
      box-sizing: border-box;
      padding: 10px;
    }

    .slide img {
      width: 100%;
      border-radius: 10px;
    }

    .slide-number {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 2rem;
      font-weight: bold;
      background-color: rgba(0, 0, 0, 0.7);
      padding: 5px 10px;
      border-radius: 5px;
    }

    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background-color: rgba(0, 0, 0, 0.7);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 2rem;
      padding: 10px;
      border-radius: 50%;
    }

    .prev-btn {
      left: 10px;
    }

    .next-btn {
      right: 10px;
    }

    .slider-btn:hover {
      background-color: #fff;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="slider-container">
    <button class="slider-btn prev-btn">&lt;</button>
    <div class="slider">
      <div class="slide">
        <img src="assets/images/movie-1.webp" alt="Lucky Baskar">
        <span class="slide-number">3</span>
      </div>
      <div class="slide">
        <img src="assets/images/movie-1.webp" alt="Bhool Bhulaiyaa 3">
        <span class="slide-number">4</span>
      </div>
      <div class="slide">
        <img src="assets/images/movie-1.webp" alt="Venom: The Last Dance">
        <span class="slide-number">5</span>
      </div>
      <div class="slide">
        <img src="assets/images/movie-1.webp" alt="Mismatched">
        <span class="slide-number">6</span>
      </div>
    </div>
    <button class="slider-btn next-btn">&gt;</button>
  </div>

  <script>
    const slider = document.querySelector(".slider");
    const nextBtn = document.querySelector(".next-btn");
    const prevBtn = document.querySelector(".prev-btn");

    let currentIndex = 0;

    function updateSlider() {
      slider.style.transform = `translateX(-${currentIndex * 25}%)`;
    }

    nextBtn.addEventListener("click", () => {
      if (currentIndex < 3) {
        currentIndex++;
        updateSlider();
      }
    });

    prevBtn.addEventListener("click", () => {
      if (currentIndex > 0) {
        currentIndex--;
        updateSlider();
      }
    });
  </script>
</body>
</html>
